name: Katkı Sağlayanlar

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu klonla
        uses: actions/checkout@v3

      - name: builds klasörünü oluştur
        run: mkdir -p builds

      - name: Katkıcı Görsellerini Oluştur
        uses: jaywcjlove/github-action-contributors@main
        with:
          filter-author: (renovate\[bot\]|renovate-bot|dependabot\[bot\])
          output: builds/katkisaglayanlar.svg
          avatarSize: 42

      - name: GitHub Pages ile Yayınla
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./builds